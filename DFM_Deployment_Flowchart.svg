<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1700" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="1700" fill="#F8FAFC"/>
  
  <!-- Title -->
  <text x="700" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1E293B">DFM Inspector — Deployment Process Flow</text>
  <text x="700" y="65" font-size="14" text-anchor="middle" fill="#64748B">From Local Python App to Team-Shared HTML Dashboard</text>
  
  <!-- Legend -->
  <g transform="translate(50, 90)">
    <rect width="280" height="100" fill="white" stroke="#CBD5E1" rx="8"/>
    <text x="10" y="20" font-size="12" font-weight="bold" fill="#1E293B">Legend</text>
    <rect x="10" y="30" width="20" height="15" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="40" y="42" font-size="11" fill="#1E293B">Phase 1: Local Development</text>
    <rect x="10" y="50" width="20" height="15" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="40" y="62" font-size="11" fill="#1E293B">Phase 2: Source Control</text>
    <rect x="10" y="70" width="20" height="15" fill="#FEE2E2" stroke="#EF4444"/>
    <text x="40" y="82" font-size="11" fill="#1E293B">Phase 3: Merge to Mainline</text>
  </g>
  <g transform="translate(340, 90)">
    <rect width="280" height="100" fill="white" stroke="#CBD5E1" rx="8"/>
    <text x="10" y="20" font-size="12" font-weight="bold" fill="#1E293B">Legend (cont.)</text>
    <rect x="10" y="30" width="20" height="15" fill="#EDE9FE" stroke="#8B5CF6"/>
    <text x="40" y="42" font-size="11" fill="#1E293B">Phase 4: Share with Team</text>
    <rect x="10" y="50" width="20" height="15" fill="#D1FAE5" stroke="#10B981"/>
    <text x="40" y="62" font-size="11" fill="#1E293B">Success / End State</text>
    <polygon points="10,72 30,72 30,87 10,87" fill="#FED7AA" stroke="#F97316"/>
    <text x="40" y="82" font-size="11" fill="#1E293B">Decision Point</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  
  <!-- START NODE -->
  <ellipse cx="700" cy="230" rx="120" ry="30" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="700" y="237" font-size="16" font-weight="bold" text-anchor="middle" fill="#065F46">START: Local Python App</text>
  
  <!-- Phase 1 Header -->
  <text x="700" y="295" font-size="18" font-weight="bold" text-anchor="middle" fill="#1E40AF">PHASE 1: LOCAL DEVELOPMENT</text>
  
  <!-- Phase 1 Box -->
  <rect x="200" y="310" width="1000" height="180" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  
  <!-- Step 1.1 -->
  <rect x="240" y="340" width="220" height="70" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="350" y="365" font-size="13" font-weight="bold" text-anchor="middle" fill="#1E40AF">1.1 Install Dependencies</text>
  <text x="350" y="385" font-size="11" text-anchor="middle" fill="#1E3A8A">pip install -r requirements.txt</text>
  
  <!-- Step 1.2 -->
  <rect x="490" y="340" width="220" height="70" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="600" y="365" font-size="13" font-weight="bold" text-anchor="middle" fill="#1E40AF">1.2 Test Locally</text>
  <text x="600" y="382" font-size="11" text-anchor="middle" fill="#1E3A8A">python app.py</text>
  <text x="600" y="397" font-size="11" text-anchor="middle" fill="#1E3A8A">→ http://localhost:5000</text>
  
  <!-- Step 1.3 -->
  <rect x="740" y="340" width="220" height="70" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8"/>
  <text x="850" y="365" font-size="13" font-weight="bold" text-anchor="middle" fill="#1E40AF">1.3 Desktop Shortcut</text>
  <text x="850" y="385" font-size="11" text-anchor="middle" fill="#1E3A8A">One-click launcher</text>
  
  <!-- Decision: App works? -->
  <polygon points="990,375 1090,335 1190,375 1090,415" fill="#FED7AA" stroke="#F97316" stroke-width="2"/>
  <text x="1090" y="370" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">App works</text>
  <text x="1090" y="388" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">locally?</text>
  
  <!-- Arrows Phase 1 -->
  <line x1="460" y1="375" x2="488" y2="375" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="710" y1="375" x2="738" y2="375" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="960" y1="375" x2="988" y2="375" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- "No" loop back -->
  <path d="M 1090 415 L 1090 450 L 350 450 L 350 412" stroke="#EF4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="445" font-size="11" text-anchor="middle" fill="#EF4444" font-weight="bold">No (debug)</text>
  
  <!-- Arrow Phase 1 → Phase 2 -->
  <line x1="700" y1="490" x2="700" y2="540" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="715" y="520" font-size="11" fill="#10B981" font-weight="bold">✓ Yes</text>
  
  <!-- Phase 2 Header -->
  <text x="700" y="565" font-size="18" font-weight="bold" text-anchor="middle" fill="#92400E">PHASE 2: BACKUP TO code.amazon.com</text>
  
  <!-- Phase 2 Box -->
  <rect x="100" y="580" width="1200" height="220" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  
  <!-- Step 2.1 -->
  <rect x="140" y="610" width="180" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="230" y="635" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400E">2.1 Connect VPN</text>
  <text x="230" y="655" font-size="11" text-anchor="middle" fill="#78350F">Cisco AnyConnect</text>
  
  <!-- Step 2.2 -->
  <rect x="350" y="610" width="180" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="440" y="635" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400E">2.2 Authenticate</text>
  <text x="440" y="655" font-size="11" text-anchor="middle" fill="#78350F">mwinit -f</text>
  
  <!-- Step 2.3 -->
  <rect x="560" y="610" width="180" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="650" y="635" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400E">2.3 Create Package</text>
  <text x="650" y="655" font-size="11" text-anchor="middle" fill="#78350F">code.amazon.com/</text>
  <text x="650" y="670" font-size="11" text-anchor="middle" fill="#78350F">packages/create</text>
  
  <!-- Step 2.4 -->
  <rect x="770" y="610" width="180" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="860" y="635" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400E">2.4 Clone Package</text>
  <text x="860" y="655" font-size="10" text-anchor="middle" fill="#78350F">git clone ssh://git.amazon.com</text>
  <text x="860" y="668" font-size="10" text-anchor="middle" fill="#78350F">:2222/pkg/PACKAGE</text>
  
  <!-- Step 2.5 -->
  <rect x="980" y="610" width="200" height="70" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="8"/>
  <text x="1080" y="635" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400E">2.5 Copy Code In</text>
  <text x="1080" y="652" font-size="10" text-anchor="middle" fill="#78350F">src/, app.py, dfm_config/</text>
  <text x="1080" y="667" font-size="10" text-anchor="middle" fill="#78350F">⚠ NOT 'config' folder</text>
  
  <!-- Step 2.6 -->
  <rect x="450" y="710" width="500" height="70" fill="#FED7AA" stroke="#F97316" stroke-width="2" rx="8"/>
  <text x="700" y="735" font-size="14" font-weight="bold" text-anchor="middle" fill="#9A3412">2.6 Push to Feature Branch (NOT mainline!)</text>
  <text x="700" y="755" font-size="11" text-anchor="middle" fill="#78350F">git push origin HEAD:refs/heads/initial-import</text>
  <text x="700" y="770" font-size="10" text-anchor="middle" fill="#9A3412" font-style="italic">Mainline is protected — direct push will fail</text>
  
  <!-- Arrows Phase 2 -->
  <line x1="320" y1="645" x2="348" y2="645" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="645" x2="558" y2="645" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="645" x2="768" y2="645" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="950" y1="645" x2="978" y2="645" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Drop down to step 2.6 -->
  <path d="M 1080 680 L 1080 695 L 700 695 L 700 708" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Arrow to Phase 3 -->
  <line x1="700" y1="800" x2="700" y2="850" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Phase 3 Header -->
  <text x="700" y="875" font-size="18" font-weight="bold" text-anchor="middle" fill="#991B1B">PHASE 3: MERGE TO MAINLINE (BOTTLENECK)</text>
  
  <!-- Phase 3 Box -->
  <rect x="200" y="890" width="1000" height="220" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  
  <!-- Decision: Cloud Desktop -->
  <polygon points="600,920 700,890 800,920 700,950" fill="#FED7AA" stroke="#F97316" stroke-width="2"/>
  <text x="700" y="918" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">Have Cloud</text>
  <text x="700" y="934" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">Desktop?</text>
  
  <!-- Option A: Cloud Desktop -->
  <rect x="240" y="980" width="280" height="100" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" rx="8"/>
  <text x="380" y="1005" font-size="13" font-weight="bold" text-anchor="middle" fill="#991B1B">Option A: YES → Use cr CLI</text>
  <text x="380" y="1027" font-size="10" text-anchor="middle" fill="#7F1D1D">cr --destination-branch mainline</text>
  <text x="380" y="1043" font-size="10" text-anchor="middle" fill="#7F1D1D">  --summary "[Pkg] Initial import"</text>
  <text x="380" y="1059" font-size="10" text-anchor="middle" fill="#7F1D1D">  --reviewers &lt;alias&gt;</text>
  <text x="380" y="1074" font-size="10" text-anchor="middle" fill="#7F1D1D" font-style="italic">→ Review → Merge to mainline</text>
  
  <!-- Option B: Teammate -->
  <rect x="560" y="980" width="280" height="100" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" rx="8"/>
  <text x="700" y="1005" font-size="13" font-weight="bold" text-anchor="middle" fill="#991B1B">Option B: NO → Ask Teammate</text>
  <text x="700" y="1025" font-size="11" text-anchor="middle" fill="#7F1D1D">Send package URL + branch</text>
  <text x="700" y="1042" font-size="11" text-anchor="middle" fill="#7F1D1D">name to teammate with</text>
  <text x="700" y="1059" font-size="11" text-anchor="middle" fill="#7F1D1D">Cloud Desktop access.</text>
  <text x="700" y="1074" font-size="11" text-anchor="middle" fill="#7F1D1D" font-style="italic">They run cr → review → merge</text>
  
  <!-- Option C: Defer -->
  <rect x="880" y="980" width="280" height="100" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" rx="8"/>
  <text x="1020" y="1005" font-size="13" font-weight="bold" text-anchor="middle" fill="#991B1B">Option C: Defer</text>
  <text x="1020" y="1025" font-size="11" text-anchor="middle" fill="#7F1D1D">Stay on initial-import branch</text>
  <text x="1020" y="1042" font-size="11" text-anchor="middle" fill="#7F1D1D">Code is safely backed up</text>
  <text x="1020" y="1059" font-size="11" text-anchor="middle" fill="#7F1D1D">on code.amazon.com</text>
  <text x="1020" y="1074" font-size="11" text-anchor="middle" fill="#7F1D1D" font-style="italic">Skip pipeline for now</text>
  
  <!-- Arrows from decision -->
  <line x1="650" y1="945" x2="430" y2="978" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="950" x2="700" y2="978" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="945" x2="970" y2="978" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrow to Phase 4 -->
  <line x1="700" y1="1110" x2="700" y2="1160" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Phase 4 Header -->
  <text x="700" y="1185" font-size="18" font-weight="bold" text-anchor="middle" fill="#5B21B6">PHASE 4: SHARE WITH TEAM</text>
  
  <!-- Phase 4 Box -->
  <rect x="50" y="1200" width="1300" height="430" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  
  <!-- Decision: Sharing path -->
  <polygon points="600,1240 700,1210 800,1240 700,1270" fill="#FED7AA" stroke="#F97316" stroke-width="2"/>
  <text x="700" y="1238" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">Sharing</text>
  <text x="700" y="1254" font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">Goal?</text>
  
  <!-- PATH A: AgentSpaces -->
  <rect x="100" y="1300" width="540" height="280" fill="#FAF5FF" stroke="#A855F7" stroke-width="2" rx="10"/>
  <text x="370" y="1325" font-size="15" font-weight="bold" text-anchor="middle" fill="#6B21A8">📚 PATH A: AgentSpaces Dashboard (Docs)</text>
  
  <rect x="120" y="1340" width="240" height="60" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="240" y="1362" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">A.1 Generate Rules MD</text>
  <text x="240" y="1382" font-size="10" text-anchor="middle" fill="#6B21A8">DFM_RULES_REFERENCE.md</text>
  
  <rect x="380" y="1340" width="240" height="60" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="500" y="1362" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">A.2 Upload to AgentSpace</text>
  <text x="500" y="1382" font-size="10" text-anchor="middle" fill="#6B21A8">+ source PDFs</text>
  
  <rect x="120" y="1420" width="240" height="60" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="240" y="1442" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">A.3 Ask AI for Dashboard</text>
  <text x="240" y="1462" font-size="10" text-anchor="middle" fill="#6B21A8">"Generate HTML dashboard"</text>
  
  <rect x="380" y="1420" width="240" height="60" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="6"/>
  <text x="500" y="1442" font-size="12" font-weight="bold" text-anchor="middle" fill="#065F46">A.4 Share URL ✓</text>
  <text x="500" y="1462" font-size="10" text-anchor="middle" fill="#047857">Team gets browsable docs</text>
  
  <line x1="360" y1="1370" x2="378" y2="1370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 500 1400 L 500 1410 L 240 1410 L 240 1418" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <line x1="360" y1="1450" x2="378" y2="1450" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <text x="370" y="1510" font-size="11" font-style="italic" text-anchor="middle" fill="#6B21A8">⏱ Effort: ~1 hour</text>
  <text x="370" y="1530" font-size="11" font-style="italic" text-anchor="middle" fill="#6B21A8">📋 Result: Static rules reference</text>
  <text x="370" y="1550" font-size="11" font-style="italic" text-anchor="middle" fill="#6B21A8">⚠ Cannot analyze STEP files</text>
  
  <!-- PATH B: Live App -->
  <rect x="760" y="1300" width="540" height="280" fill="#FAF5FF" stroke="#A855F7" stroke-width="2" rx="10"/>
  <text x="1030" y="1325" font-size="15" font-weight="bold" text-anchor="middle" fill="#6B21A8">⚙ PATH B: Live Working App</text>
  
  <rect x="780" y="1340" width="160" height="100" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="860" y="1360" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">B.1 Local</text>
  <text x="860" y="1376" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">Installer</text>
  <text x="860" y="1395" font-size="10" text-anchor="middle" fill="#6B21A8">setup.bat per user</text>
  <text x="860" y="1410" font-size="10" text-anchor="middle" fill="#6B21A8">via Quip share</text>
  <text x="860" y="1428" font-size="10" font-style="italic" text-anchor="middle" fill="#6B21A8">⏱ 1-2 days</text>
  
  <rect x="950" y="1340" width="160" height="100" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="1030" y="1360" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">B.2 Shared</text>
  <text x="1030" y="1376" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">Cloud Desktop</text>
  <text x="1030" y="1395" font-size="10" text-anchor="middle" fill="#6B21A8">Team URL access</text>
  <text x="1030" y="1410" font-size="10" text-anchor="middle" fill="#6B21A8">port 5000 open</text>
  <text x="1030" y="1428" font-size="10" font-style="italic" text-anchor="middle" fill="#6B21A8">⏱ 3-5 days</text>
  
  <rect x="1120" y="1340" width="160" height="100" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2" rx="6"/>
  <text x="1200" y="1360" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">B.3 Production</text>
  <text x="1200" y="1376" font-size="12" font-weight="bold" text-anchor="middle" fill="#5B21B6">Pipeline+Apollo</text>
  <text x="1200" y="1395" font-size="10" text-anchor="middle" fill="#6B21A8">Auto-deployed</text>
  <text x="1200" y="1410" font-size="10" text-anchor="middle" fill="#6B21A8">Midway auth</text>
  <text x="1200" y="1428" font-size="10" font-style="italic" text-anchor="middle" fill="#6B21A8">⏱ 1-3 weeks</text>
  
  <rect x="780" y="1460" width="500" height="60" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="6"/>
  <text x="1030" y="1482" font-size="13" font-weight="bold" text-anchor="middle" fill="#065F46">Result: Team can analyze their own STEP files ✓</text>
  <text x="1030" y="1502" font-size="11" text-anchor="middle" fill="#047857">Live web app with full DFM analysis capability</text>
  
  <line x1="860" y1="1440" x2="950" y2="1460" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1030" y1="1440" x2="1030" y2="1458" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1200" y1="1440" x2="1110" y2="1460" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <text x="1030" y="1545" font-size="11" font-style="italic" text-anchor="middle" fill="#6B21A8">📋 Result: Working DFM analyzer</text>
  <text x="1030" y="1565" font-size="11" font-style="italic" text-anchor="middle" fill="#6B21A8">✓ Upload STEP files → Get analysis</text>
  
  <!-- Arrows from decision -->
  <line x1="650" y1="1265" x2="430" y2="1298" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="1285" font-size="11" fill="#475569" font-weight="bold">Docs</text>
  <line x1="750" y1="1265" x2="970" y2="1298" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="1285" font-size="11" fill="#475569" font-weight="bold">Live App</text>
  
  <!-- END NODE -->
  <ellipse cx="700" cy="1660" rx="180" ry="30" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="700" y="1667" font-size="16" font-weight="bold" text-anchor="middle" fill="#065F46">END: Team Has Access ✓</text>
  
  <!-- Arrows from Path A and B to end -->
  <path d="M 370 1580 L 370 1620 L 700 1620 L 700 1632" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1030 1580 L 1030 1620 L 700 1620 L 700 1632" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
